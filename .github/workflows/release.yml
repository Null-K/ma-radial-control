name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  packageName: "com.puddingkc.ma-radial-control"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Set version in package.json
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" '.version = $ver' "package.json" > tmp.json && mv tmp.json "package.json"

      - name: Create zip
        run: |
          mkdir -p release
          zip -r "release/${{ env.packageName }}-${{ steps.version.outputs.version }}.zip" . -x ".git/*" ".github/*" "release/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/${{ env.packageName }}-${{ steps.version.outputs.version }}.zip
            package.json
